<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; color: #333; }
h1 { font-size: 22px; margin-bottom: 12px; }
p { font-size: 14px; line-height: 1.6; color: #555; }
.steps { margin-top: 16px; }
.step { margin-bottom: 8px; }
.step strong { color: #333; }
.footer { margin-top: 16px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<h1>Apex Agent</h1>
<p>This will install the Apex Agent daemon on your Mac.</p>
<div class="steps">
    <div class="step"><strong>What happens next:</strong></div>
    <div class="step">1. The agent binary is installed to <code>/usr/local/bin/</code></div>
    <div class="step">2. A background service starts automatically</div>
    <div class="step">3. A dialog will ask for your setup token from the Apex dashboard</div>
</div>
<p class="footer">
    Requires macOS 13 (Ventura) or later.
</p>
</body>
</html>
