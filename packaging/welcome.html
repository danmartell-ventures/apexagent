<h1>Apex Agent</h1>
<p>This will install the Apex Agent daemon on your Mac.</p>
<div class="steps">
    <div class="step"><strong>What happens next:</strong></div>
    <div class="step">1. The agent binary is installed to <code>/usr/local/bin/</code></div>
    <div class="step">2. A background service starts automatically</div>
    <div class="step">3. A dialog will ask for your setup token from the Apex dashboard</div>
</div>
<p class="footer">
    Requires macOS 13 (Ventura) or later.
</p>
