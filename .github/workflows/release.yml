name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate icons
        run: go run scripts/gen-icons.go

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        continue-on-error: true
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Import signing certificates
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build and sign PKG installer
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SIGN_ID_APP="Developer ID Application: everydev, LLC ($APPLE_TEAM_ID)"
          SIGN_ID_PKG="Developer ID Installer: everydev, LLC ($APPLE_TEAM_ID)"

          # Match the Makefile pkg target exactly
          mkdir -p bin/pkg-root/usr/local/bin bin/pkg-root/usr/local/share/apex
          cp dist/apex-agent_darwin_all/apex-agent bin/pkg-root/usr/local/bin/apex-agent
          cp packaging/apex.icns bin/pkg-root/usr/local/share/apex/apex.icns

          # Sign binary IN pkg-root (cp strips signatures)
          codesign --force --options runtime --timestamp \
            --entitlements packaging/entitlements.plist \
            --sign "$SIGN_ID_APP" \
            bin/pkg-root/usr/local/bin/apex-agent

          codesign --verify --deep --strict bin/pkg-root/usr/local/bin/apex-agent

          pkgbuild \
            --root bin/pkg-root \
            --identifier host.apex.agent \
            --version "$VERSION" \
            --scripts packaging/scripts \
            bin/apex-agent.pkg

          productbuild \
            --distribution packaging/distribution.xml \
            --resources packaging \
            --package-path bin \
            --sign "$SIGN_ID_PKG" \
            "bin/ApexAgent-${VERSION}.pkg"

          rm -f bin/apex-agent.pkg
          echo "PKG_PATH=bin/ApexAgent-${VERSION}.pkg" >> $GITHUB_ENV
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Notarize PKG
        if: env.PKG_PATH != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 600

          xcrun stapler staple "$PKG_PATH"
          xcrun stapler validate "$PKG_PATH"

      - name: Upload PKG to release
        if: env.PKG_PATH != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "$PKG_PATH" --clobber
